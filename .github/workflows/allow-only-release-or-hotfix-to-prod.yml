# .github/workflows/allow-only-release-or-hotfix-to-prod.yml
name: allow-only-release-or-hotfix-to-prod

on:
  pull_request:
    branches: [prod]
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch for prod (with Architects bypass)
        uses: actions/github-script@v7
        env:
          BYPASS_LABEL: bypass-prod-gate
          TEAM_SLUG: architects
        with:
          script: |
            const owner = context.repo.owner; // org name
            const repo = context.repo.repo;

            const baseRef = context.payload.pull_request.base.ref;
            const headRef = context.payload.pull_request.head.ref;
            const labels = (context.payload.pull_request.labels || []).map(l => l.name);

            core.info(`Repo: ${owner}/${repo}`);
            core.info(`Base: ${baseRef}`);
            core.info(`Head: ${headRef}`);
            core.info(`Labels: ${labels.join(", ") || "(none)"}`);
            core.info(`Actor: ${context.actor}`);

            if (baseRef !== "prod") {
              core.info("Not targeting prod. Skipping.");
              return;
            }

            const isAllowedSource =
              headRef.startsWith("release/") || headRef.startsWith("hotfix/");

            if (isAllowedSource) {
              core.info("OK: Source branch is release/* or hotfix/*.");
              return;
            }

            const bypassLabel = process.env.BYPASS_LABEL || "bypass-prod-gate";
            const hasBypassLabel = labels.includes(bypassLabel);

            if (!hasBypassLabel) {
              core.setFailed(
                `ERROR: PRs into 'prod' are only allowed from 'release/*' or 'hotfix/*'. ` +
                `If this is an exceptional case, add the label '${bypassLabel}' (Architects only).`
              );
              return;
            }

            // Bypass path: label exists, but only Architects can use it.
            // We validate the current actor is a member of the Architects team.
            const teamSlug = process.env.TEAM_SLUG || "architects";

            try {
              await github.request("GET /orgs/{org}/teams/{team_slug}/memberships/{username}", {
                org: owner,
                team_slug: teamSlug,
                username: context.actor,
              });

              core.info(
                `BYPASS OK: '${bypassLabel}' present and actor '${context.actor}' is in team '${teamSlug}'.`
              );
              return;
            } catch (err) {
              core.setFailed(
                `ERROR: '${bypassLabel}' label is present, but actor '${context.actor}' is NOT allowed to bypass. ` +
                `Only members of '${owner}/${teamSlug}' can bypass this gate.`
              );
              return;
            }
