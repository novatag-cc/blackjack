name: require-approvals-for-main-pr

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
  pull_request_review:
    branches: [main]
    types:
      - submitted
      - dismissed

permissions:
  contents: read
  pull-requests: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate minimum approvals for PRs targeting main
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headRef = pr.head.ref;
            const baseRef = pr.base.ref;

            if (baseRef !== "main") {
              core.info("Not targeting main. Skipping.");
              return;
            }

            // prod -> main is allowed with 0 approvals to support auto-merge sync.
            const requiredApprovals =
              (headRef.startsWith("feature/") || headRef.startsWith("hotfix/")) ? 1 : 0;

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              }
            );

            const latestStateByUser = new Map();
            for (const review of reviews) {
              if (!review.user || !review.user.login) continue;
              latestStateByUser.set(review.user.login, review.state);
            }

            const approvals = [...latestStateByUser.values()].filter((state) => state === "APPROVED").length;

            core.info(`Head: ${headRef}`);
            core.info(`Required approvals: ${requiredApprovals}`);
            core.info(`Current approvals: ${approvals}`);

            if (approvals < requiredApprovals) {
              core.setFailed(
                `ERROR: PR '${headRef}' -> '${baseRef}' requires at least ${requiredApprovals} approval(s). Current: ${approvals}.`
              );
            }
